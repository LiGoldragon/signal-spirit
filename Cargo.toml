[package]
name         = "signal-spirit"
version      = "0.6.0"
edition      = "2024"
rust-version = "1.89"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/LiGoldragon/signal-spirit"
description  = "Signal contract for the ordinary spirit surface."
publish      = false
links        = "signal-spirit"
build        = "build.rs"

[lib]
name = "signal_spirit"
path = "src/lib.rs"

[features]
default = []
nota-text = [
    "dep:nota-next",
    "signal-frame/nota-text",
    "version-projection/nota-text",
]

[dependencies]
signal-frame = { git = "https://github.com/LiGoldragon/signal-frame.git", branch = "main", default-features = false }
nota-next    = { git = "https://github.com/LiGoldragon/nota-next.git", branch = "structural-forms-integration", optional = true }
rkyv         = { version = "0.8", default-features = false, features = ["std", "bytecheck", "little_endian", "pointer_width_32", "unaligned"] }
thiserror    = "2"
version-projection = { git = "https://github.com/LiGoldragon/version-projection.git", branch = "main", default-features = false }

[build-dependencies]
schema-rust-next = { git = "https://github.com/LiGoldragon/schema-rust-next.git", branch = "structural-forms-integration" }

[dev-dependencies]
nota-next = { git = "https://github.com/LiGoldragon/nota-next.git", branch = "structural-forms-integration" }

[lints.rust]
unsafe_code = "forbid"
unused      = { level = "warn", priority = -1 }
dead_code   = "warn"
