[package]
name         = "signal-spirit"
version      = "0.8.0"
edition      = "2024"
rust-version = "1.89"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/LiGoldragon/signal-spirit"
description  = "Signal contract for the ordinary spirit surface."
publish      = false
links        = "signal-spirit"
build        = "build.rs"

[lib]
name = "signal_spirit"
path = "src/lib.rs"

[features]
default = []
nota-text = [
    "dep:nota-next",
    "dep:schema-next",
    "signal-frame/nota-text",
    "version-projection/nota-text",
]

[dependencies]
signal-frame = { git = "https://github.com/LiGoldragon/signal-frame.git", branch = "main", default-features = false }
nota-next    = { git = "https://github.com/LiGoldragon/nota-next.git", branch = "schema-ir", optional = true }
schema-next  = { git = "https://github.com/LiGoldragon/schema-next.git", branch = "schema-ir", optional = true }
rkyv         = { version = "0.8", default-features = false, features = ["std", "bytecheck", "little_endian", "pointer_width_32", "unaligned"] }
thiserror    = "2"
version-projection = { git = "https://github.com/LiGoldragon/version-projection.git", branch = "main", default-features = false }

[build-dependencies]
schema-rust-next = { git = "https://github.com/LiGoldragon/schema-rust-next.git", branch = "schema-ir" }

[dev-dependencies]
nota-next = { git = "https://github.com/LiGoldragon/nota-next.git", branch = "schema-ir" }
schema-next = { git = "https://github.com/LiGoldragon/schema-next.git", branch = "schema-ir" }

[lints.rust]
unsafe_code = "forbid"
unused      = { level = "warn", priority = -1 }
dead_code   = "warn"

# Unified-IR integration: redirect the whole dependency tree (signal-frame,
# version-projection, and their transitives) onto the schema-ir worktrees so
# one nota-next / schema-next / schema-rust-next version carries BOTH the Help
# schema codec and the instance-schema NotaDecodeTraced trait + derive end to
# end — the two consumers of the one SourceReference IR. Path patches resolve
# to a different source than the git deps, which a branch-only patch cannot.
# These local paths are for the integration build of this designer branch; an
# operator integration replaces them with the merged main.
[patch."https://github.com/LiGoldragon/nota-next.git"]
nota-next = { path = "../../nota-next/schema-ir" }

[patch."https://github.com/LiGoldragon/schema-next.git"]
schema-next = { path = "../../schema-next/schema-ir" }

[patch."https://github.com/LiGoldragon/schema-rust-next.git"]
schema-rust-next = { path = "../../schema-rust-next/schema-ir" }
